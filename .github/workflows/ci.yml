name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build_test_package:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: admin_bd
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d admin_bd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for Postgres to accept connections
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U admin -d admin_bd >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Restore keystore from GitHub Secret (base64) if available
        shell: bash
        env:
          KEYSTORE_P12_B64: ${{ secrets.KEYSTORE_P12_B64 }}
        run: |
          set -euo pipefail
          mkdir -p .ci-secrets

          if [ -z "${KEYSTORE_P12_B64:-}" ]; then
            echo "KEYSTORE_P12_B64 is empty/unavailable in this run (likely PR from fork). Skipping keystore restore."
            exit 0
          fi

          printf '%s' "$KEYSTORE_P12_B64" | base64 -d > .ci-secrets/keystore.p12
          chmod 600 .ci-secrets/keystore.p12
          ls -la .ci-secrets/keystore.p12
          file .ci-secrets/keystore.p12 || true

      - name: Verify keystore (optional)
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ! -f ".ci-secrets/keystore.p12" ]; then
            echo "Keystore file not present -> skip verify"
            exit 0
          fi
          if [ -z "${KEYSTORE_PASSWORD:-}" ]; then
            echo "KEYSTORE_PASSWORD not available -> skip verify"
            exit 0
          fi

          keytool -list -v -storetype PKCS12 \
            -keystore ".ci-secrets/keystore.p12" \
            -storepass "${KEYSTORE_PASSWORD}" \
          | egrep -n "Alias name|Entry type|Certificate chain length" || true

      - name: Restore signature keystore from GitHub Secret (base64) if available
        shell: bash
        env:
          SIGNATURE_KEYSTORE_B64: ${{ secrets.SIGNATURE_KEYSTORE_B64 }}
          SIGNATURE_KEYSTORE_PASSWORD: ${{ secrets.SIGNATURE_KEYSTORE_PASSWORD }}
          SIGNATURE_KEY_PASSWORD: ${{ secrets.SIGNATURE_KEY_PASSWORD }}
          SIGNATURE_KEY_ALIAS: ${{ vars.SIGNATURE_KEY_ALIAS }}
          SIGNATURE_PUBLIC_KEY_BASE64: ${{ vars.SIGNATURE_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p .ci-secrets

          if [ -z "${SIGNATURE_KEYSTORE_B64:-}" ]; then
            echo "SIGNATURE_KEYSTORE_B64 is empty/unavailable. The build will use the classpath keystore."
          else
            printf '%s' "$SIGNATURE_KEYSTORE_B64" | base64 -d > .ci-secrets/signature.jks
            chmod 600 .ci-secrets/signature.jks
            echo "SIGNATURE_KEY_STORE_PATH=file:${GITHUB_WORKSPACE}/.ci-secrets/signature.jks" >> "$GITHUB_ENV"
            echo "SIGNATURE_KEY_STORE_TYPE=JKS" >> "$GITHUB_ENV"
          fi

          if [ -n "${SIGNATURE_KEYSTORE_PASSWORD:-}" ]; then
            echo "SIGNATURE_KEY_STORE_PASSWORD=${SIGNATURE_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SIGNATURE_KEY_PASSWORD:-}" ]; then
            echo "SIGNATURE_KEY_PASSWORD=${SIGNATURE_KEY_PASSWORD}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SIGNATURE_KEY_ALIAS:-}" ]; then
            echo "SIGNATURE_KEY_ALIAS=${SIGNATURE_KEY_ALIAS}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SIGNATURE_PUBLIC_KEY_BASE64:-}" ]; then
            echo "SIGNATURE_PUBLIC_KEY_BASE64=${SIGNATURE_PUBLIC_KEY_BASE64}" >> "$GITHUB_ENV"
          fi

      - name: Verify signature keystore and public key variable (optional)
        shell: bash
        env:
          SIGNATURE_KEYSTORE_PASSWORD: ${{ secrets.SIGNATURE_KEYSTORE_PASSWORD }}
          SIGNATURE_KEY_ALIAS: ${{ vars.SIGNATURE_KEY_ALIAS }}
          SIGNATURE_PUBLIC_KEY_BASE64: ${{ vars.SIGNATURE_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [ ! -f ".ci-secrets/signature.jks" ]; then
            echo "Signature keystore file not present -> skip verify"
            exit 0
          fi

          STORE_PASSWORD="${SIGNATURE_KEYSTORE_PASSWORD:-changeit}"
          KEY_ALIAS="${SIGNATURE_KEY_ALIAS:-ticket-signing}"

          keytool -list -storetype JKS \
            -keystore ".ci-secrets/signature.jks" \
            -storepass "${STORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" >/dev/null

          if [ -z "${SIGNATURE_PUBLIC_KEY_BASE64:-}" ]; then
            echo "SIGNATURE_PUBLIC_KEY_BASE64 not available -> skip compare"
            exit 0
          fi

          ACTUAL_PUBLIC_KEY=$(keytool -exportcert -rfc \
            -alias "${KEY_ALIAS}" \
            -keystore ".ci-secrets/signature.jks" \
            -storepass "${STORE_PASSWORD}" \
            | openssl x509 -pubkey -noout \
            | openssl pkey -pubin -outform der \
            | base64 \
            | tr -d '\n')

          test "${ACTUAL_PUBLIC_KEY}" = "${SIGNATURE_PUBLIC_KEY_BASE64}"

      - name: Compile
        run: mvn -q -DskipTests compile

      - name: Test (disable SSL in tests)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/admin_bd
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin
        run: mvn -q -Dserver.ssl.enabled=false test

      - name: Package (jar)
        run: mvn -q -DskipTests package

      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: antivirus-${{ github.sha }}
          path: target/*.jar
